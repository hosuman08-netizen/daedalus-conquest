<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Dark luxurious gradient base: deep black-purple to emerald dark -->
    <linearGradient id="bgGrad" gradientTransform="rotate(165)" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05040c"/>
      <stop offset="35%" stop-color="#0a0814"/>
      <stop offset="65%" stop-color="#0d1418"/>
      <stop offset="100%" stop-color="#0b0714"/>
    </linearGradient>

    <!-- Very subtle gold accent wash -->
    <linearGradient id="goldWash" gradientTransform="rotate(140)" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#f5c451" stop-opacity="0.035"/>
      <stop offset="50%" stop-color="#f5c451" stop-opacity="0.015"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.025"/>
    </linearGradient>

    <!-- Repeating pattern tile: sparse elegant Daedalus motifs -->
    <pattern id="daedalusPattern" patternUnits="userSpaceOnUse" width="420" height="420" patternTransform="translate(0,0)">
      <!-- faint outer frame lines (labyrinth feel) -->
      <rect x="20" y="20" width="380" height="380" fill="none" stroke="#f5c451" stroke-width="1.2" stroke-opacity="0.07" rx="6"/>
      <rect x="48" y="48" width="324" height="324" fill="none" stroke="#f5c451" stroke-width="0.8" stroke-opacity="0.05"/>

      <!-- Labyrinth line segments (sparse Greek maze) -->
      <g stroke="#f5c451" stroke-width="1.1" stroke-opacity="0.085" fill="none" stroke-linecap="round">
        <!-- top maze -->
        <path d="M70 70 h90"/>
        <path d="M70 110 h55 v40 h70"/>
        <path d="M180 70 v55 h60"/>
        <path d="M280 95 h70"/>
        <!-- mid -->
        <path d="M95 180 h140"/>
        <path d="M95 230 v70 h85"/>
        <path d="M260 200 h80 v55"/>
        <path d="M120 310 h160"/>
      </g>

      <!-- Delicate wing motif (Daedalus / Icarus) - small elegant -->
      <g fill="none" stroke="#f5c451" stroke-opacity="0.09" stroke-width="0.9">
        <!-- left wing simplified -->
        <path d="M145 165 q-28 -18 -12 -42 q22 -12 38 3 q12 14 4 31"/>
        <path d="M150 172 q-20 -8 -6 -26"/>
        <!-- right wing -->
        <path d="M275 165 q28 -18 12 -42 q-22 -12 -38 3 q-12 14 -4 31"/>
        <path d="M270 172 q20 -8 6 -26"/>
      </g>

      <!-- Small Greek key / meander accents -->
      <g stroke="#c8b070" stroke-width="0.7" stroke-opacity="0.06" fill="none">
        <path d="M55 340 h18 v12 h-12 v-6"/>
        <path d="M360 78 h-18 v-12 h12 v6"/>
      </g>

      <!-- Tiny energy runes / circuit dots -->
      <circle cx="105" cy="260" r="2.2" fill="#f5c451" fill-opacity="0.07"/>
      <circle cx="315" cy="285" r="1.8" fill="#a855f7" fill-opacity="0.08"/>
      <circle cx="220" cy="135" r="1.5" fill="#f5c451" fill-opacity="0.06"/>
      <circle cx="78" cy="145" r="1.6" fill="#c8b070" fill-opacity="0.07"/>

      <!-- Very faint long vertical "thread" lines for depth (like string in labyrinth) -->
      <line x1="210" y1="55" x2="210" y2="365" stroke="#f5c451" stroke-width="0.6" stroke-opacity="0.035"/>
      <line x1="130" y1="40" x2="130" y2="390" stroke="#a855f7" stroke-width="0.5" stroke-opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Main background -->
  <rect width="1080" height="1920" fill="url(#bgGrad)"/>

  <!-- Gold/purple subtle wash -->
  <rect width="1080" height="1920" fill="url(#goldWash)"/>

  <!-- Pattern overlay - very sparse and elegant -->
  <rect width="1080" height="1920" fill="url(#daedalusPattern)" />

  <!-- Extra corner accents for premium feel (very faint) -->
  <g opacity="0.045">
    <!-- top right faint wing echo -->
    <path d="M920 120 q60 -55 110 -25" fill="none" stroke="#f5c451" stroke-width="1.5"/>
    <path d="M950 95 q35 -30 55 5" fill="none" stroke="#f5c451" stroke-width="1"/>
  </g>
</svg>
