<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>다이달로스 — AI 군단 전쟁</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1 data-i18n="title">⚔️ AI 군단 전쟁</h1>
      <div id="score"></div>
    </header>

    <div id="metabar">
      <span class="meta gold">💰 <i id="gold">300</i></span>
      <span class="meta ch">📖 <i id="chapter">1</i></span>
      <button id="settings-btn">⚙️</button>
      <button id="starter-btn" data-i18n="pkg">💎 패키지</button>
      <button id="gacha-btn" data-i18n="gacha">🎰 뽑기 100</button>
    </div>

    <div id="modes">
      <button class="modetab" data-m="campaign" data-i18n="mode.campaign">📖 캠페인</button>
      <button class="modetab" data-m="tower" data-i18n="mode.tower">🗼 무한탑</button>
      <button class="modetab" data-m="daily" data-i18n="mode.daily">📅 일일</button>
      <button class="modetab" data-m="boss" data-i18n="mode.boss">🐲 보스</button>
      <button class="modetab" data-m="turnbased" data-i18n="mode.turnbased">⚔️ 턴제</button>
      <button class="modetab" data-m="arena" data-i18n="mode.arena">🏟️ 아레나</button>
    </div>

    <div id="heroes">
      <div class="herorow">
        <button class="hbtn" data-h="strategist">🧠</button>
        <button class="hbtn" data-h="berserker">⚡</button>
        <button class="hbtn" data-h="warden">🛡️</button>
        <button class="hbtn" data-h="ranger">🎯</button>
        <button class="hbtn" data-h="mech">🤖</button>
        <button class="hbtn" data-h="engineer">💉</button>
        <button class="hbtn" data-h="dragoon">🐉</button>
      </div>
      <div id="hero-info">
        <div><b id="hero-name"></b> <button id="hero-up"></button></div>
        <div id="hero-desc"></div>
      </div>
    </div>

    <div id="status">군대를 배치하고 ▶ 전투 시작</div>

    <canvas id="field"></canvas>

    <button id="ult" disabled>💥</button>

    <div id="deploy">
      <div class="tag"><span data-i18n="armyTitle">🔵 내 군단</span> <small data-i18n="armySub"></small></div>
      <div class="army b">
        <span class="step">🛸<button data-side="p" data-t="drone" data-d="-1">−</button><i id="p-drone">4</i><button data-side="p" data-t="drone" data-d="1">+</button><em id="lv-drone"></em><u class="px">35g</u></span>
        <span class="step">🎯<button data-side="p" data-t="marksman" data-d="-1">−</button><i id="p-marksman">2</i><button data-side="p" data-t="marksman" data-d="1">+</button><em id="lv-marksman"></em><u class="px">60g</u></span>
        <span class="step">🛡️<button data-side="p" data-t="guardian" data-d="-1">−</button><i id="p-guardian">1</i><button data-side="p" data-t="guardian" data-d="1">+</button><em id="lv-guardian"></em><u class="px">75g</u></span>
        <span class="step">🤖<button data-side="p" data-t="bruiser" data-d="-1">−</button><i id="p-bruiser">1</i><button data-side="p" data-t="bruiser" data-d="1">+</button><em id="lv-bruiser"></em><u class="px">70g</u></span>
        <span class="step">🧠<button data-side="p" data-t="commander" data-d="-1">−</button><i id="p-commander">0</i><button data-side="p" data-t="commander" data-d="1">+</button><em id="lv-commander"></em><u class="px">150g</u></span>
        <span class="step" id="slot-titan" style="display:none">🐉<button data-side="p" data-t="titan" data-d="-1">−</button><i id="p-titan">0</i><button data-side="p" data-t="titan" data-d="1">+</button><em id="lv-titan"></em><u class="px">700g</u></span>
      </div>
    </div>

    <div id="controls">
      <button id="start" data-i18n="start">▶ 전투 시작</button>
      <button id="auto" data-i18n="auto">⚔️ 자동사냥</button>
      <button id="speed">속도 1x</button>
    </div>
    <div id="controls" style="margin-top:6px">
      <button id="reset" data-i18n="reset">↻ 다시</button>
    </div>

    <div id="legend">
      <span data-i18n="legend1"></span><br/>
      <span data-i18n="legend2"></span><br/>
      <b data-i18n="legend3"></b>
    </div>

    <!-- 결과 -->
    <div id="overlay" class="hidden">
      <div id="overlay-card">
        <div id="overlay-msg"></div>
        <button id="overlay-btn"></button>
      </div>
    </div>

    <!-- 가챠 -->
    <div id="gacha" class="hidden">
      <div id="gacha-card">
        <div id="gacha-rank">SSR</div>
        <div id="gacha-msg"></div>
        <button id="gacha-close" data-i18n="confirm">확인</button>
      </div>
    </div>

    <!-- 스타터팩 -->
    <div id="starter" class="hidden">
      <div id="starter-card">
        <div class="sp-badge" data-i18n="spTitle">💎 초심자 패키지</div>
        <div class="sp-perks">
          <div data-i18n="sp1"></div><div data-i18n="sp2"></div><div data-i18n="sp3"></div><div data-i18n="sp4"></div>
        </div>
        <div class="sp-price" data-i18n="spPrice"></div>
        <button id="starter-buy" data-i18n="buy">구매하기</button>
        <button id="starter-close" class="ghost" data-i18n="later">나중에</button>
      </div>
    </div>

    <!-- 설정 -->
    <div id="settings" class="hidden">
      <div id="settings-card">
        <div class="set-title">⚙️ <span data-i18n="setTitle">설정</span></div>
        <div class="set-sec">🌐 <span data-i18n="setLang">언어</span></div>
        <div id="lang-list"></div>
        <div class="set-row"><span>🔊 <span data-i18n="setSound">사운드</span></span><button id="set-sound" class="toggle">ON</button></div>
        <div class="set-row"><span>📳 <span data-i18n="setHaptic">진동</span></span><button id="set-haptic" class="toggle">ON</button></div>
        <button id="set-reset" class="danger" data-i18n="setReset">진행 초기화</button>
        <div class="set-ver">v0.3 · 다이달로스</div>
        <button id="settings-close" class="ghost" data-i18n="confirm">확인</button>
      </div>
    </div>

    <div id="toast"></div>
  </div>
  <script src="i18n.js"></script>
  <script src="game.js"></script>
</body>
</html>
